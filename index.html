<!DOCTYPE html>
<html>
<head>
<title>TNWEEBZ STORAGE</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body onload="checkUser()">

<nav>🔥 TNWEEBZ STORAGE</nav>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginCard">
  <h3>Login / Signup</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<!-- UPLOAD -->
<div class="card" id="uploadCard" style="display:none;">
  <h3>Upload File</h3>
  <input type="file" id="fileInput">
  <button onclick="upload()">Upload</button>
</div>

<!-- SEARCH -->
<div class="card" id="searchCard" style="display:none;">
  <h3>Search</h3>
  <input id="search" placeholder="Search file...">
  <button onclick="searchFile()">Search</button>
</div>

<!-- HISTORY -->
<div class="card" id="historyCard" style="display:none;">
  <h3>Your Files</h3>
  <div id="fileList"></div>
</div>

<!-- ADMIN -->
<div class="card" id="adminPanel" style="display:none;">
  <h3>Admin Dashboard 👑</h3>
  <p>Total Users: <span id="usersCount"></span></p>
  <p>Total Files: <span id="filesCount"></span></p>
</div>

<!-- ACTION BUTTONS -->
<div class="card" style="display:none;" id="actionCard">
  <button onclick="buyPro()">Upgrade to Pro 🚀</button>
  <button onclick="logout()">Logout</button>
</div>

</div>

<!-- JS FILES -->
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/upload.js"></script>
<script src="js/files.js"></script>
<script src="js/admin.js"></script>
<script src="js/payment.js"></script>

<script>
// show action buttons after login
function showUserUI(userId) {
  loginCard.style.display = "none";
  uploadCard.style.display = "block";
  searchCard.style.display = "block";
  historyCard.style.display = "block";
  actionCard.style.display = "block";

  loadFiles(userId);
  checkAdmin(userId);
}
</script>

</body>
</html>
