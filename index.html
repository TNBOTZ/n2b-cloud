<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Video Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="nav">
            <button onclick="showTab('uploadTab')">Upload</button>
            <button onclick="showTab('historyTab')">History & Search</button>
        </div>

        <div id="uploadTab" class="tab-content active">
            <h2>Upload Video</h2>
            <p class="warning">Max size for playable links: 20MB</p>
            <input type="file" id="videoInput" accept="video/*">
            <button id="uploadBtn" onclick="uploadVideo()">Upload & Generate Link</button>
            <p id="statusMessage"></p>
        </div>

        <div id="historyTab" class="tab-content">
            <h2>Your Videos</h2>
            <input type="text" id="searchInput" placeholder="Search videos..." onkeyup="searchVideos()">
            <ul id="historyList"></ul>
        </div>

        <div id="playerTab" class="tab-content">
            <h2>Video Player</h2>
            <video id="videoPlayer" controls width="100%"></video>
            <p id="shareableLink"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
