<!DOCTYPE html>
<html>
<head>
<title>Player</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

video {
  width: 95%;
  max-height: 95%;
}
</style>

</head>

<body>

<video controls id="player"></video>

<script>
const video = localStorage.getItem("video");

if (video) {
  document.getElementById("player").src = video;
} else {
  alert("No video found!");
}
</script>

</body>
</html>
